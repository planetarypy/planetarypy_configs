# PlanetaryPy Index URLs Configuration

# This file contains URLs for PDS indices, organized by mission and instrument

# MRO Mission
[mro]

# CTX Instrument
[mro.ctx]
edr = "https://planetarydata.jpl.nasa.gov/img/data/mro/ctx/mrox_5010/index/cumindex.lbl"

# HIRISE Instrument
[mro.hirise]
dtm = "https://hirise-pds.lpl.arizona.edu/PDS/INDEX/DTMCUMINDEX.LBL"
edr = "https://hirise-pds.lpl.arizona.edu/PDS/INDEX/EDRCUMINDEX.LBL"
rdr = "https://hirise-pds.lpl.arizona.edu/PDS/INDEX/RDRCUMINDEX.LBL"

# CRISM Instrument
[mro.crism]
mtrdr = "https://pds-geosciences.wustl.edu/mro/mro-m-crism-5-rdr-mptargeted-v1/mrocr_4001/index/mtrdr0705_index.lbl"


[mer_spirit.pancam]
# also called mer2
# Pancam Science Radiometrically Calibrated Image RDRs, version 2 (PDS4)
rdr = "https://pds-geosciences.wustl.edu/mer/mer2-m-pancam-3-radcal-sci-v2/mer2pc_1002/index/index.lbl"

[mer_opportunity.pancam]
# also called mer1
# Pancam Science Radiometrically Calibrated Image RDRs, version 2 (PDS4)
rdr = "https://pds-geosciences.wustl.edu/mer/mer1-m-pancam-3-radcal-sci-v2/mer1pc_1002/index/index.lbl"

# Lro Mission
[lro]

# LROC Instrument
[lro.lroc]
edr = "https://pds.lroc.asu.edu/data/LRO-L-LROC-2-EDR-V1.0/LROLRC_0061C/INDEX/CUMINDEX.LBL"


# DIVINER Instrument
[lro.diviner]
edr1 = "https://pds-geosciences.wustl.edu/lro/lro-l-dlre-2-edr-v1/lrodlr_0001/index/index.lbl"
edr2 = "https://pds-geosciences.wustl.edu/lro/lro-l-dlre-2-edr-v1/lrodlr_0002/index/index.lbl"
rdr1 = "https://pds-geosciences.wustl.edu/lro/lro-l-dlre-4-rdr-v1/lrodlr_1001/index/rdrindex.lbl"
rdr2 = "https://pds-geosciences.wustl.edu/lro/lro-l-dlre-4-rdr-v1/lrodlr_1002/index/rdrindex.lbl"

# LAMP Instrument
[lro.lamp]
edr = "https://planetarydata.jpl.nasa.gov/img/data/lro/lamp/edr/LROLAM_0062/INDEX/CUMINDEX.LBL"
rdr = "https://planetarydata.jpl.nasa.gov/img/data/lro/lamp/rdr/LROLAM_1062/INDEX/CUMINDEX.LBL"

# LOLA Instrument
[lro.lola]
edr = "http://pds-geosciences.wustl.edu/lro/lro-l-lola-2-edr-v1/lrolol_0xxx/index/edrindex.lbl"
rdr = "http://pds-geosciences.wustl.edu/lro/lro-l-lola-3-rdr-v1/lrolol_1xxx/index/rdrindex.lbl"


# Cassini Mission
[cassini]

# ISS Instrument
# `index` is the Saturn-orbit dataset (COISS_2xxx, 2004-2017).
# `cruise_index` covers the Earth/Venus/Jupiter cruise (COISS_1xxx, 1997-2003).
[cassini.iss]
index = "https://pds-rings.seti.org/holdings/metadata/COISS_2xxx/COISS_2999/COISS_2999_index.lbl"
inventory = "https://pds-rings.seti.org/holdings/metadata/COISS_2xxx/COISS_2999/COISS_2999_inventory.lbl"
moon_summary = "https://pds-rings.seti.org/holdings/metadata/COISS_2xxx/COISS_2999/COISS_2999_moon_summary.lbl"
ring_summary = "https://pds-rings.seti.org/holdings/metadata/COISS_2xxx/COISS_2999/COISS_2999_ring_summary.lbl"
saturn_summary = "https://pds-rings.seti.org/holdings/metadata/COISS_2xxx/COISS_2999/COISS_2999_saturn_summary.lbl"
cruise_index = "https://pds-rings.seti.org/holdings/metadata/COISS_1xxx/COISS_1999/COISS_1999_index.lbl"

# CIRS Instrument (Saturn orbit 2010-2017, 3 geometry index types)
[cassini.cirs]
cube_equi_index = "https://pds-rings.seti.org/holdings/metadata/COCIRS_1xxx/COCIRS_9999/COCIRS_9999_cube_equi_index.lbl"
cube_point_index = "https://pds-rings.seti.org/holdings/metadata/COCIRS_1xxx/COCIRS_9999/COCIRS_9999_cube_point_index.lbl"
cube_ring_index = "https://pds-rings.seti.org/holdings/metadata/COCIRS_1xxx/COCIRS_9999/COCIRS_9999_cube_ring_index.lbl"

# RSS Occultations
[cassini.rss]
index = "https://pds-rings.seti.org/holdings/metadata/CORSS_8xxx/CORSS_8001/CORSS_8001_index.lbl"
profile_index = "https://pds-rings.seti.org/holdings/metadata/CORSS_8xxx/CORSS_8001/CORSS_8001_profile_index.lbl"

# UVIS Instrument
# Regular observations are COUVIS_0xxx; `occ_*` keys cover the stellar
# occultation campaign (COUVIS_8xxx).
[cassini.uvis]
index = "https://pds-rings.seti.org/holdings/metadata/COUVIS_0xxx/COUVIS_0999/COUVIS_0999_index.lbl"
moon_summary = "https://pds-rings.seti.org/holdings/metadata/COUVIS_0xxx/COUVIS_0999/COUVIS_0999_moon_summary.lbl"
ring_summary = "https://pds-rings.seti.org/holdings/metadata/COUVIS_0xxx/COUVIS_0999/COUVIS_0999_ring_summary.lbl"
saturn_summary = "https://pds-rings.seti.org/holdings/metadata/COUVIS_0xxx/COUVIS_0999/COUVIS_0999_saturn_summary.lbl"
supplemental_index = "https://pds-rings.seti.org/holdings/metadata/COUVIS_0xxx/COUVIS_0999/COUVIS_0999_supplemental_index.lbl"
versions = "https://pds-rings.seti.org/holdings/metadata/COUVIS_0xxx/COUVIS_0999/COUVIS_0999_versions.lbl"
occ_index = "https://pds-rings.seti.org/holdings/metadata/COUVIS_8xxx/COUVIS_8001/COUVIS_8001_index.lbl"
occ_profile_index = "https://pds-rings.seti.org/holdings/metadata/COUVIS_8xxx/COUVIS_8001/COUVIS_8001_profile_index.lbl"

# VIMS Instrument
# Regular observations are COVIMS_0xxx; `occ_*` keys cover the stellar
# occultation campaign (COVIMS_8xxx).
[cassini.vims]
index = "https://pds-rings.seti.org/holdings/metadata/COVIMS_0xxx/COVIMS_0999/COVIMS_0999_index.lbl"
moon_summary = "https://pds-rings.seti.org/holdings/metadata/COVIMS_0xxx/COVIMS_0999/COVIMS_0999_moon_summary.lbl"
ring_summary = "https://pds-rings.seti.org/holdings/metadata/COVIMS_0xxx/COVIMS_0999/COVIMS_0999_ring_summary.lbl"
saturn_summary = "https://pds-rings.seti.org/holdings/metadata/COVIMS_0xxx/COVIMS_0999/COVIMS_0999_saturn_summary.lbl"
supplemental_index = "https://pds-rings.seti.org/holdings/metadata/COVIMS_0xxx/COVIMS_0999/COVIMS_0999_supplemental_index.lbl"
occ_index = "https://pds-rings.seti.org/holdings/metadata/COVIMS_8xxx/COVIMS_8001/COVIMS_8001_index.lbl"
occ_profile_index = "https://pds-rings.seti.org/holdings/metadata/COVIMS_8xxx/COVIMS_8001/COVIMS_8001_profile_index.lbl"

# Galileo Orbiter Mission
[go]

# SSI Instrument
[go.ssi]
body_summary = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_body_summary.lbl"
index = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_index.lbl"
# the inventory file is an irregular (meaning variable number of columns) CSV file (instead of standard TAB), so
# I'm taking it out for now until a reader has been implemented
# inventory = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_inventory.lbl"
jupiter_summary = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_jupiter_summary.lbl"
moon_summary = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_moon_summary.lbl"
ring_summary = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_ring_summary.lbl"
sky_summary = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_sky_summary.lbl"
supplemental_index = "https://pds-rings.seti.org/holdings/metadata/GO_0xxx/GO_0999/GO_0999_supplemental_index.lbl"

# Voyager Mission (SETI Rings Node)
# VGISS_5xxx = Voyager 1 Jupiter, VGISS_6xxx = Voyager 2, VGISS_7xxx = Voyager 2 (additional)
[voyager1.iss]
index = "https://pds-rings.seti.org/holdings/metadata/VGISS_5xxx/VGISS_5999/VGISS_5999_index.lbl"
raw_image_index = "https://pds-rings.seti.org/holdings/metadata/VGISS_5xxx/VGISS_5999/VGISS_5999_raw_image_index.lbl"
jupiter_summary = "https://pds-rings.seti.org/holdings/metadata/VGISS_5xxx/VGISS_5999/VGISS_5999_jupiter_summary.lbl"
moon_summary = "https://pds-rings.seti.org/holdings/metadata/VGISS_5xxx/VGISS_5999/VGISS_5999_moon_summary.lbl"
ring_summary = "https://pds-rings.seti.org/holdings/metadata/VGISS_5xxx/VGISS_5999/VGISS_5999_ring_summary.lbl"
supplemental_index = "https://pds-rings.seti.org/holdings/metadata/VGISS_5xxx/VGISS_5999/VGISS_5999_supplemental_index.lbl"

[voyager2.iss]
