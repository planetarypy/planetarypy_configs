# MGS Mission
[mgs]

# MOC Instrument (Mars Orbiter Camera)
[mgs.moc]
edr = "https://planetarydata.jpl.nasa.gov/img/data/mgs/moc/mgsc_1578/index/cumindex.lbl"
rdr = "https://planetarydata.jpl.nasa.gov/img/data/mgs/moc/rdr/mgscim_1578/index/cumindex.lbl"

# Viking Orbiter Mission
# vo_1064 cumindex covers both Viking 1 (vo_1001-vo_1032) and Viking 2 (vo_1051-vo_1064)
[viking.vis]
edr = "https://planetarydata.jpl.nasa.gov/img/data/viking/viking_orbiter/vo_1064/index/cumindex.lbl"

# MESSENGER Mission
[messenger]

# MDIS Instrument (Mercury Dual Imaging System)
[messenger.mdis]
edr = "https://planetarydata.jpl.nasa.gov/img/data/messenger/MSGRMDS_1001/INDEX/CUMINDEX.LBL"
cdr = "https://planetarydata.jpl.nasa.gov/img/data/messenger/MSGRMDS_2001/INDEX/CUMINDEX.LBL"

# Phoenix Mission (MECA instruments: WCL, TECP, ELEC, AFM share one index)
[phoenix.meca]
edr = "https://pds-geosciences.wustl.edu/phx/phx-m-meca-2-niedr-v1/phxmec_0xxx/index/index.lbl"
rdr = "https://pds-geosciences.wustl.edu/phx/phx-m-meca-4-nirdr-v1/phxmec_1xxx/index/index.lbl"

# MSL Mission (single-volume archives — index.tab IS the cumulative index)
[msl]

# APXS Instrument
[msl.apxs]
edr = "https://pds-geosciences.wustl.edu/msl/msl-m-apxs-2-edr-v1/mslapx_0xxx/index/index.lbl"
rdr = "https://pds-geosciences.wustl.edu/msl/msl-m-apxs-4_5-rdr-v1/mslapx_1xxx/index/index.lbl"

# ChemCam Instrument (EDR index covers LIBS+RMI+SOH; RDR has separate libs/rmi indexes)
[msl.ccam]
