rmi_rdr = "https://pds-geosciences.wustl.edu/msl/msl-m-chemcam-libs-4_5-rdr-v1/mslccm_1xxx/index/rmiindex.lbl"

# CheMin Instrument
[msl.cmn]
edr = "https://pds-geosciences.wustl.edu/msl/msl-m-chemin-2-edr-v1/mslcmn_0xxx/index/index.lbl"
rdr = "https://pds-geosciences.wustl.edu/msl/msl-m-chemin-4-rdr-v1/mslcmn_1xxx/index/index.lbl"

# SAM Instrument (per-level indexes)
[msl.sam]
